<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Round 3 + 免费模型对比 · 30题综合能力总榜</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --gold: #ffd700; --green: #3fb950; --red: #f85149;
  --blue: #58a6ff; --purple: #bc8cff; --orange: #ffa657;
  --text: #e6edf3; --muted: #8b949e; --subtext: #c9d1d9;
}
body { background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh; padding: 40px 20px; }
.container { max-width: 1100px; margin: 0 auto; }

.header { text-align: center; margin-bottom: 50px; }
.header h1 { font-size: 26px; font-weight: 700; margin-bottom: 14px; }
.header .sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
.badge-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.badge { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.badge-paid { background: rgba(255,215,0,0.12); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
.badge-free { background: rgba(63,185,80,0.12); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
.badge-new { background: rgba(88,166,255,0.12); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px 32px; margin-bottom: 28px; }
.card-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 20px 0 12px; }
.section-title:first-child { margin-top: 0; }

table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; background: rgba(255,255,255,0.02); white-space: nowrap; }
td { padding: 11px 14px; border-bottom: 1px solid rgba(48,54,61,0.5); color: var(--subtext); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

.rank { font-weight: 700; font-size: 15px; }
.rank-gold { color: var(--gold); }
.rank-silver { color: #c0c0c0; }
.rank-bronze { color: #cd7f32; }
.rank-muted { color: var(--muted); }

.model-name { font-weight: 600; color: var(--subtext); }
.model-tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 700; }
.tag-paid { background: rgba(255,215,0,0.15); color: var(--gold); }
.tag-free { background: rgba(63,185,80,0.15); color: var(--green); }
.tag-best { background: rgba(88,166,255,0.15); color: var(--blue); }
.tag-hidden { background: rgba(248,81,73,0.15); color: var(--red); }

.score-cell { font-weight: 800; font-size: 15px; }
.score-high { color: var(--green); }
.score-mid { color: var(--orange); }
.score-low { color: var(--muted); }

.j-kimi { color: var(--blue); }
.j-minimax { color: var(--purple); }
.j-qwen { color: var(--orange); }

.bar-cell { width: 140px; }
.bar-track { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s; }

.tab-bar { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn { padding: 7px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.2s; }
.tab-btn:hover { background: rgba(255,255,255,0.05); color: var(--subtext); }
.tab-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.dim-bar-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.dim-label { font-size: 12px; font-weight: 700; color: var(--muted); width: 70px; flex-shrink: 0; }
.dim-bar-track { flex: 1; height: 22px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; position: relative; }
.dim-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
.dim-score { font-size: 12px; font-weight: 700; color: var(--text); width: 36px; text-align: right; flex-shrink: 0; }

.footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>🏆 30题LLM综合能力总榜</h1>
  <p class="sub">统一 rubric · 三裁判独立评分 · 全部实打实测</p>
  <div class="badge-row">
    <span class="badge badge-paid">🏅 付费模型（Round 3）</span>
    <span class="badge badge-free">🌿 免费模型（Groq）</span>
    <span class="badge badge-new">🆕 含各维度单独榜单</span>
    <a href="/benchmark-methodology" style="padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(255,166,87,0.12);color:#ffa657;border:1px solid rgba(255,166,87,0.3);text-decoration:none;">📋 评测方法论</a>
  </div>
</div>

<!-- MAIN RANKING TABLE -->
<div class="card">
  <div class="card-title">📊 总榜（3裁判平均，满分100）</div>
  <table>
    <thead>
      <tr>
        <th>排名</th>
        <th>模型</th>
        <th>来源</th>
        <th>总分</th>
        <th>相对百分比</th>
      </tr>
    </thead>
    <tbody id="main-tbody"></tbody>
  </table>
</div>

<!-- JUDGE SCORES TABLE -->
<div class="card">
  <div class="card-title">⚖️ 各裁判评分详情</div>
  <table>
    <thead>
      <tr>
        <th>模型</th>
        <th>kimi 裁判</th>
        <th>minimax 裁判</th>
        <th>qwen 裁判</th>
        <th>平均</th>
      </tr>
    </thead>
    <tbody id="judge-tbody"></tbody>
  </table>
</div>

<!-- DIMENSION TABS -->
<div class="card">
  <div class="card-title">📐 各维度单独榜单</div>
  <div class="tab-bar" id="dim-tabs"></div>
  <div id="dim-panels"></div>
</div>

<div class="footer">
  Will AI Lab · 30题LLM综合能力榜 · 评测方法论完全公开<br>
  数据来源：kimi · minimax · qwen 三大裁判独立评分
</div>

</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const ALL_MODELS = [
  // Round 3 paid models
  { id:'mimo',      identity:'小米mimo',         isPaid:true,  kimi:95.8, minimax:99.2, qwen:97.7, avg:97.6,  hidden:false, color:'#58a6ff', dims:{M:97.0,P:97.5,R:98.5,A:97.5,'L-CN':98.0,'L-JP':96.5} },
  { id:'opus',      identity:'Claude Opus 4.6',  isPaid:true,  kimi:94.8, minimax:100.0,qwen:96.4, avg:97.1,  hidden:false, color:'#f0883e', dims:{M:99.0,P:98.0,R:99.0,A:97.0,'L-CN':93.0,'L-JP':97.0} },
  { id:'qwen3.6',   identity:'Qwen 3.6-plus',     isPaid:true,  kimi:93.2, minimax:96.4, qwen:96.4, avg:95.3,  hidden:false, color:'#ffa657', dims:{M:95.0,P:97.0,R:96.0,A:94.0,'L-CN':94.0,'L-JP':95.0} },
  { id:'qwen3.5',  identity:'Qwen 3.5-plus',     isPaid:true,  kimi:95.7, minimax:95.7, qwen:92.5, avg:94.6,  hidden:false, color:'#ffa657', dims:{M:96.0,P:96.0,R:97.0,A:93.0,'L-CN':92.0,'L-JP':94.0} },
  { id:'m2.7',     identity:'MiniMax M2.7',       isPaid:true,  kimi:96.0, minimax:95.5, qwen:88.7, avg:93.4,  hidden:false, color:'#bc8cff', dims:{M:98.0,P:95.0,R:96.0,A:89.0,'L-CN':92.0,'L-JP':91.0} },
  { id:'gpt54',    identity:'GPT-5.4',            isPaid:true,  kimi:94.2, minimax:91.0, qwen:94.6, avg:93.3,  hidden:false, color:'#3fb950', dims:{M:96.0,P:93.0,R:95.0,A:92.0,'L-CN':91.0,'L-JP':93.0} },
  { id:'kimi',     identity:'Kimi K2.5',          isPaid:true,  kimi:95.2, minimax:92.7, qwen:91.7, avg:93.2,  hidden:false, color:'#58a6ff', dims:{M:92.0,P:93.0,R:92.0,A:94.0,'L-CN':95.0,'L-JP':96.0} },
  // Groq free models
  { id:'qwen3-32b',identity:'Qwen3-32B (Groq)',  isPaid:false, kimi:87.6, minimax:81.5, qwen:87.1, avg:85.4,  hidden:false, color:'#ffa657', dims:{M:77.0,P:88.0,R:90.0,A:90.0,'L-CN':83.0,'L-JP':80.0} },
  { id:'llama',    identity:'Llama 3.3 70B (Groq)',isPaid:false,kimi:69.8, minimax:61.7, qwen:82.6, avg:71.4,  hidden:false, color:'#f85149', dims:{M:52.0,P:73.0,R:83.0,A:71.0,'L-CN':72.0,'L-JP':68.0} },
];

// ─── HELPERS ───────────────────────────────────────────────────────────────
function scoreClass(s) {
  if (s >= 95) return 'score-high';
  if (s >= 85) return 'score-mid';
  return 'score-low';
}
function rankClass(idx) {
  if (idx === 0) return 'rank-gold';
  if (idx === 1) return 'rank-silver';
  if (idx === 2) return 'rank-bronze';
  return 'rank-muted';
}

// ─── BUILD MAIN TABLE ──────────────────────────────────────────────────────
function buildMainTable() {
  const tbody = document.getElementById('main-tbody');
  const max = 100;
  ALL_MODELS.forEach((m, idx) => {
    const medal = idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
    const tag = m.isPaid
      ? '<span class="model-tag tag-paid">付费</span>'
      : '<span class="model-tag tag-free">免费</span>';
    const pct = (m.avg / max * 100).toFixed(1);
    const sc = scoreClass(m.avg);
    const barColor = m.color;
    const rc = rankClass(idx);

    const row = `<tr>
      <td class="rank ${rc}" style="font-size:18px">${medal || (idx+1)}</td>
      <td class="model-name">${m.identity}</td>
      <td>${tag}</td>
      <td class="score-cell ${sc}" style="font-size:17px;font-weight:900">${m.avg.toFixed(1)}</td>
      <td class="bar-cell">
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${barColor}"></div>
        </div>
      </td>
    </tr>`;
    tbody.insertAdjacentHTML('beforeend', row);
  });
}

// ─── BUILD JUDGE TABLE ──────────────────────────────────────────────────────
function buildJudgeTable() {
  const tbody = document.getElementById('judge-tbody');
  ALL_MODELS.forEach((m, idx) => {
    const tag = m.isPaid
      ? '<span class="model-tag tag-paid">付费</span>'
      : '<span class="model-tag tag-free">免费</span>';
    const avgSc = scoreClass(m.avg);

    const row = `<tr>
      <td class="model-name">${m.identity} ${tag}</td>
      <td class="j-kimi" style="font-weight:600">${m.kimi.toFixed(1)}</td>
      <td class="j-minimax" style="font-weight:600">${m.minimax.toFixed(1)}</td>
      <td class="j-qwen" style="font-weight:600">${m.qwen.toFixed(1)}</td>
      <td class="score-cell ${avgSc}" style="font-weight:800">${m.avg.toFixed(1)}</td>
    </tr>`;
    tbody.insertAdjacentHTML('beforeend', row);
  });
}

// ─── BUILD DIMENSION TABS ───────────────────────────────────────────────────
const DIMS = [
  { key:'M',      label:'数学 Math',    color:'#3fb950' },
  { key:'P',      label:'编程 Prog',   color:'#58a6ff' },
  { key:'R',      label:'推理 Logic',   color:'#bc8cff' },
  { key:'A',      label:'Agent',        color:'#ffa657' },
  { key:'L-CN',   label:'中文',         color:'#f85149' },
  { key:'L-JP',   label:'日语',         color:'#ff7b72' },
];

function buildDimTabs() {
  const tabBar = document.getElementById('dim-tabs');
  const panels = document.getElementById('dim-panels');

  DIMS.forEach((dim, di) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (di === 0 ? ' active' : '');
    btn.textContent = dim.label;
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + dim.key).classList.add('active');
    };
    tabBar.appendChild(btn);

    // Panel
    const panel = document.createElement('div');
    panel.id = 'panel-' + dim.key;
    panel.className = 'tab-panel' + (di === 0 ? ' active' : '');
    panel.style.cssText = 'background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px 26px;margin-bottom:16px';

    const sorted = [...ALL_MODELS].sort((a,b) => b.dims[dim.key] - a.dims[dim.key]);
    const max = 100;

    sorted.forEach((m, idx) => {
      const pct = (m.dims[dim.key] / max * 100).toFixed(1);
      const medal = idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
      const tag = m.isPaid ? '付费' : '免费';
      const tagColor = m.isPaid ? 'var(--gold)' : 'var(--green)';

      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:12px;margin-bottom:12px';
      row.innerHTML = `
        <span style="font-size:16px;font-weight:700;width:28px;text-align:center;color:${idx<3?'var(--gold)':'var(--muted)'}">${medal || (idx+1)}</span>
        <span style="font-weight:600;color:var(--subtext);flex:0 0 180px">${m.identity}</span>
        <span style="font-size:11px;color:${tagColor};flex:0 0 36px">${tag}</span>
        <div style="flex:1;height:20px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${dim.color};border-radius:4px;transition:width 0.5s"></div>
        </div>
        <span style="font-weight:800;font-size:15px;color:var(--text);width:38px;text-align:right">${m.dims[dim.key].toFixed(0)}</span>
      `;
      panel.appendChild(row);
    });

    panels.appendChild(panel);
  });
}

// ─── INIT ───────────────────────────────────────────────────────────────────
buildMainTable();
buildJudgeTable();
buildDimTabs();
</script>
</body>
</html>
